name: API Automation Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create Temporary Config File
        run: |
          mkdir -p src/test/resources/config
          echo "base.uri=https://serverest.dev" > src/test/resources/config/config.properties
          echo "admin.email=admin_pipeline@qa.com" >> src/test/resources/config/config.properties
          echo "admin.password=teste" >> src/test/resources/config/config.properties
          echo "log.all=false" >> src/test/resources/config/config.properties

      - name: Run API Tests
        run: mvn clean test

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 1